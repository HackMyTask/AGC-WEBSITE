name: Generate Content

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Number of terms to generate (10-50)"
        required: false
        default: "20"
        type: string
      priority:
        description: "Priority level (1 or 2, leave empty for all)"
        required: false
        type: string
      random:
        description: "Generate random N articles (10-50, overrides batch_size)"
        required: false
        type: string
  schedule:
    - cron: "0 2 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          npm install
          pip install -r requirements.txt

      - name: Generate content
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DAILY_LIMIT: ${{ secrets.DAILY_LIMIT }}
          INPUT_BATCH_SIZE: ${{ github.event.inputs.batch_size }}
          INPUT_PRIORITY: ${{ github.event.inputs.priority }}
          INPUT_RANDOM: ${{ github.event.inputs.random }}
        run: |
          AI_PROVIDER="${AI_PROVIDER:-groq}"
          DAILY_LIMIT="${DAILY_LIMIT:-50000}"

          BATCH="${INPUT_BATCH_SIZE:-20}"
          PRIO="${INPUT_PRIORITY}"
          RAND="${INPUT_RANDOM}"

          if [ "$BATCH" -lt 10 ] || [ "$BATCH" -gt 50 ]; then
            echo "Error: Batch size must be between 10-50, got $BATCH"
            exit 1
          fi

          CMD="python scripts/generate.py --batch $BATCH"

          if [ -n "$PRIO" ]; then
            CMD="$CMD --priority $PRIO"
          fi

          if [ -n "$RAND" ]; then
            if [ "$RAND" -lt 10 ] || [ "$RAND" -gt 50 ]; then
              echo "Error: Random batch size must be between 10-50, got $RAND"
              exit 1
            fi
            CMD="python scripts/generate.py --random $RAND"
            if [ -n "$PRIO" ]; then
              CMD="$CMD --priority $PRIO"
            fi
          fi

          echo "Running: $CMD"
          $CMD

      - name: Update internal links
        run: python scripts/internal_links.py

      - name: Check for failures
        run: |
          if [ -f logs/quality_failures.log ] && [ -s logs/quality_failures.log ]; then
            echo "Quality gate failures detected:"
            cat logs/quality_failures.log
          fi

      - name: Commit and push changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/glossary/ data/terms_*.csv 2>/dev/null || true
          git add logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new content to commit"
            exit 0
          fi
          ARTICLES_COUNT=$(ls -1 src/content/glossary/*.md 2>/dev/null | wc -l)
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          git commit -m "chore: auto-generate glossary content [$ARTICLES_COUNT articles] $TIMESTAMP"
          git push

      - name: Log generation stats
        if: always()
        run: |
          echo "## Generation Stats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/usage.log ]; then
            echo "**Token Usage (last 5):**" >> $GITHUB_STEP_SUMMARY
            tail -5 logs/usage.log >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f logs/quality_failures.log ] && [ -s logs/quality_failures.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Quality Failures:**" >> $GITHUB_STEP_SUMMARY
            cat logs/quality_failures.log >> $GITHUB_STEP_SUMMARY
          fi
