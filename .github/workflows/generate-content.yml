name: Generate Content
# refresh workflow to trigger manual button appearance

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of terms to generate (10-50)'
        required: false
        default: '20'
      priority:
        description: 'Priority level (1 or 2, leave empty for all)'
        required: false
      random:
        description: 'Generate random N articles (10-50, overrides batch_size)'
        required: false
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          npm install
          pip install -r requirements.txt

      - name: Generate content
        env:
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DAILY_LIMIT: ${{ secrets.DAILY_LIMIT }}
        run: |
          # Set defaults for environment variables
          AI_PROVIDER="${AI_PROVIDER:-groq}"
          DAILY_LIMIT="${DAILY_LIMIT:-100}"

          # Set defaults for workflow inputs
          BATCH_SIZE="${{ github.event.inputs.batch_size }}"
          BATCH_SIZE="${BATCH_SIZE:-20}"
          PRIORITY="${{ github.event.inputs.priority }}"
          RANDOM="${{ github.event.inputs.random }}"

          # Validate batch size
          if [ "$BATCH_SIZE" -lt 10 ] || [ "$BATCH_SIZE" -gt 50 ]; then
            echo "Error: Batch size must be between 10-50, got $BATCH_SIZE"
            exit 1
          fi

          # Build command
          CMD="python scripts/generate.py --batch $BATCH_SIZE"

          # Add priority if specified
          if [ -n "$PRIORITY" ]; then
            CMD="$CMD --priority $PRIORITY"
          fi

          # Use random if specified (overrides batch_size)
          if [ -n "$RANDOM" ]; then
            if [ "$RANDOM" -lt 10 ] || [ "$RANDOM" -gt 50 ]; then
              echo "Error: Random batch size must be between 10-50, got $RANDOM"
              exit 1
            fi
            CMD="python scripts/generate.py --random $RANDOM"
            if [ -n "$PRIORITY" ]; then
              CMD="$CMD --priority $PRIORITY"
            fi
          fi

          echo "Running: $CMD"
          $CMD

      - name: Update internal links
        run: python scripts/internal_links.py

      - name: Check for failures
        run: |
          if [ -f logs/quality_failures.log ] && [ -s logs/quality_failures.log ]; then
            echo "⚠️ Quality gate failures detected:"
            cat logs/quality_failures.log
            echo "::warning::Some articles failed quality gate validation"
          fi

      - name: Commit and push changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add src/content/glossary/ data/terms.csv logs/
          ARTICLES_COUNT=$(ls -1 src/content/glossary/*.md 2>/dev/null | wc -l)
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          git commit -m "chore: auto-generate glossary content

- Generated $ARTICLES_COUNT articles
- Updated internal links
- Timestamp: $TIMESTAMP"
          git push

      - name: Log generation stats
        if: always()
        run: |
          echo "## Generation Stats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Batch Size:** ${{ github.event.inputs.batch_size || '20' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Priority:** ${{ github.event.inputs.priority || 'All' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Random:** ${{ github.event.inputs.random || 'No' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Token Usage:**" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/usage.log ]; then
            tail -5 logs/usage.log >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API Rotations:**" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/api_rotation.log ]; then
            tail -3 logs/api_rotation.log >> $GITHUB_STEP_SUMMARY
          else
            echo "None" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files Written:**" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/writes.log ]; then
            grep "WRITTEN" logs/writes.log | wc -l | xargs echo "Articles written:" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quality Failures:**" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/quality_failures.log ] && [ -s logs/quality_failures.log ]; then
            wc -l logs/quality_failures.log >> $GITHUB_STEP_SUMMARY
          else
            echo "None" >> $GITHUB_STEP_SUMMARY
          fi

